name: Primer Workflow CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker base
        run: docker build -t app-base .

      - name: Medir tamano de imagen
        run: docker image inspect app-base --format="{{.Size}}"

      - name: Ejecutar contenedor y verificar
        run: |
          docker run -d -p 3000:3000 --name contenedor-base app-base
          sleep 3
          curl http://localhost:3000
          docker stop contenedor-base

      - name: Ver uso de recursos
        run: docker stats contenedor-base --no-stream || true
